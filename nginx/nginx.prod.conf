# ============================================================
# FinWallet — Nginx Production Config (HTTPS + Let's Encrypt)
# Sử dụng với docker-compose.prod.yml
# ============================================================

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  upstream api  { server api:3001;  }
  upstream web  { server web:3000;  }

  # ── HTTP → HTTPS Redirect ─────────────────────────────────
  server {
    listen 80;
    server_name finwallet.yourdomain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect tất cả sang HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS Server ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name finwallet.yourdomain.com;

    # SSL Certificates (Certbot)
    ssl_certificate     /etc/nginx/ssl/live/finwallet.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/finwallet.yourdomain.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Client Upload Size (OCR images)
    client_max_body_size 10M;

    # ── Frontend ─────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API ──────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_read_timeout 120s;
    }

    # ── WebSocket (Socket.io) ────────────────────
    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
    }
  }
}
